name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  changelog:
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.cliff.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          args: --latest --strip header

  release:
    needs: changelog
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            rust-target: aarch64-apple-darwin
          - platform: macos-15-intel
            rust-target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            rust-target: ''
          - platform: windows-latest
            rust-target: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rust-target != ''
        run: rustup target add ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Sync release version
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const version = process.env.GITHUB_REF_NAME.replace(/^v/, "");

          function writeJson(path, update) {
            const value = JSON.parse(fs.readFileSync(path, "utf8"));
            update(value);
            fs.writeFileSync(path, `${JSON.stringify(value, null, 2)}\n`);
          }

          function replaceRequired(path, pattern, replacement) {
            const value = fs.readFileSync(path, "utf8");
            if (!pattern.test(value)) {
              throw new Error(`Version pattern not found in ${path}`);
            }
            fs.writeFileSync(path, value.replace(pattern, replacement));
          }

          writeJson("package.json", (value) => {
            value.version = version;
          });

          writeJson("package-lock.json", (value) => {
            value.version = version;
            value.packages[""].version = version;
          });

          writeJson("src-tauri/tauri.conf.json", (value) => {
            value.version = version;
          });

          replaceRequired(
            "src-tauri/Cargo.toml",
            /^version = ".*"$/m,
            `version = "${version}"`,
          );

          replaceRequired(
            "src-tauri/Cargo.lock",
            /(\[\[package\]\]\r?\nname = "wakatoken"\r?\nversion = ")[^"]+(")/,
            `$1${version}$2`,
          );
          NODE

      - name: Install Node.js dependencies
        run: npm install

      - name: Verify release version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO_VERSION=$(cargo metadata --manifest-path src-tauri/Cargo.toml --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "wakatoken") | .version')

          test "$PACKAGE_VERSION" = "$TAG_VERSION"
          test "$TAURI_VERSION" = "$TAG_VERSION"
          test "$CARGO_VERSION" = "$TAG_VERSION"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'WakaToken ${{ github.ref_name }}'
          releaseBody: ${{ needs.changelog.outputs.changelog }}
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.rust-target != '' && format('--target {0}', matrix.rust-target) || '' }}
