<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WakaToken Settings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>WakaToken</h1>
      <span class="version">v1.0.0</span>
    </header>

    <section class="stats-card">
      <div class="stats-row">
        <div class="stat">
          <span class="stat-value" id="stat-input">-</span>
          <span class="stat-label">Input</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="stat-output">-</span>
          <span class="stat-label">Output</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="stat-total">-</span>
          <span class="stat-label">Synced</span>
        </div>
      </div>
      <div class="stats-footer" id="stats-footer">Not synced yet</div>
    </section>

    <section class="settings">
      <div class="device-auth">
        <button id="device-auth-btn">Sign in with Browser</button>
        <div id="device-auth-result" class="test-result"></div>
      </div>
    </section>

    <footer class="footer">
      <a href="#" id="dashboard-link">Open Dashboard</a>
      <span class="dot">·</span>
      <a href="#" id="docs-link">Docs</a>
    </footer>
  </div>

  <script src="main.js"></script>
</body>
</html>
